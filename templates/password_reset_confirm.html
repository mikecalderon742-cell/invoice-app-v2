{% extends "base.html" %}
{% block content %}

<div class="dashboard-header">
    <h1>Choose a new password</h1>
</div>

<div class="form-wrapper fade-in-up">
    {% if error %}
        <div style="
            margin-bottom:16px;
            padding:12px 14px;
            border-radius:10px;
            font-size:14px;
            font-weight:500;
            background:#fee2e2;
            color:#b91c1c;
            border:1px solid #dc2626;
        ">
            {{ error }}
        </div>
    {% endif %}

    {% if success %}
        <div style="
            margin-bottom:16px;
            padding:12px 14px;
            border-radius:10px;
            font-size:14px;
            font-weight:500;
            background:#dcfce7;
            color:#166534;
            border:1px solid #16a34a;
        ">
            {{ success }}
        </div>
    {% endif %}

    <p style="font-size:13px; opacity:.8; margin-bottom:16px;">
        Set a strong password you don’t use anywhere else.
    </p>

    <form method="POST" action="{{ url_for('password_reset_confirm', token=token) }}">
        <label style="font-weight:600; font-size:14px;">New password</label>
        <input
            type="password"
            name="password"
            required
            minlength="8"
            placeholder="••••••••"
        >

        <label style="font-weight:600; font-size:14px; margin-top:10px;">Confirm password</label>
        <input
            type="password"
            name="confirm_password"
            required
            minlength="8"
            placeholder="••••••••"
        >

        <div class="form-actions" style="display:flex; justify-content:space-between; align-items:center; margin-top:18px;">
            <a href="{{ url_for('login') }}" style="font-size:13px; opacity:.8;">
                Back to login
            </a>
            <button type="submit" class="btn btn-brand">
                Update password
            </button>
        </div>
    </form>
</div>

{% endblock %}
