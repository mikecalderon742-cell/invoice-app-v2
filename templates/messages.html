{% extends "base.html" %}
{% block title %}Messages{% endblock %}

{% block content %}

<style>
.messages-shell {
    display: flex;
    height: calc(100vh - 110px);
    background: #f8fafc;
}

/* LEFT PANEL */
.convo-list {
    width: 300px;
    border-right: 1px solid #e5e7eb;
    background: #ffffff;
    overflow-y: auto;
}

.convo-item {
    padding: 14px;
    cursor: pointer;
    border-bottom: 1px solid #f1f5f9;
}

.convo-item:hover {
    background: #f1f5f9;
}

.convo-item.active {
    background: #e0f2fe;
}

/* RIGHT PANEL */
.chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #ffffff;
}

.chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

/* BUBBLES */
.bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 18px;
    margin-bottom: 10px;
    font-size: 14px;
}

.bubble.me {
    background: #0ea5e9;
    color: white;
    align-self: flex-end;
}

.bubble.them {
    background: #e5e7eb;
    align-self: flex-start;
}

/* INPUT */
.chat-input {
    display: flex;
    gap: 10px;
    padding: 12px;
    border-top: 1px solid #e5e7eb;
    background: #ffffff;
    position: relative;
    z-index: 9999;
}

.chat-input input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}

/* MOBILE */
@media (max-width: 768px) {
    .messages-shell {
        flex-direction: column;
    }

    .convo-list {
        width: 100%;
        height: 40%;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
    }
}
</style>

<div class="messages-shell">

    <!-- LEFT -->
    <div class="convo-list">
        <h3 style="padding:12px;">Conversations</h3>

        {% for convo in conversations %}
        <div class="convo-item" onclick="openConversation({{ convo.id }}, this)">
            Conversation {{ convo.id }}
        </div>
        {% endfor %}
    </div>

    <!-- RIGHT -->
    <div class="chat-panel">

        <div id="chatMessages" class="chat-messages">
            <p style="opacity:0.6;">Select a conversation</p>
        </div>

        <form class="chat-input" onsubmit="sendMessage(event)">
            <input id="messageInput" placeholder="Type message..." autocomplete="off"/>
            <button class="btn" type="submit">Send</button>
        </form>

    </div>

</div>

<script>
let currentConversationId = null;

async function openConversation(id, el=null) {
    currentConversationId = id;

    // highlight active
    document.querySelectorAll(".convo-item").forEach(i => i.classList.remove("active"));
    if (el) el.classList.add("active");

    await loadMessages();
}

async function loadMessages() {
    if (!currentConversationId) return;

    const res = await fetch(`/api/messages/${currentConversationId}`);
    const data = await res.json();

    const box = document.getElementById("chatMessages");
    box.innerHTML = "";

    if (!data.messages.length) {
        box.innerHTML = '<p style="opacity:0.6;">No messages yet</p>';
        return;
    }

    data.messages.forEach(msg => {
        const div = document.createElement("div");
        div.classList.add("bubble");

        if (msg.sender_user_id == {{ current_user.id }}) {
            div.classList.add("me");
        } else {
            div.classList.add("them");
        }

        div.innerText = msg.message_text;
        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

async function sendMessage(e) {
    e.preventDefault();

    if (!currentConversationId) return;

    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text) return;

    const box = document.getElementById("chatMessages");

    // instant UI
    const temp = document.createElement("div");
    temp.classList.add("bubble", "me");
    temp.innerText = text;
    box.appendChild(temp);
    box.scrollTop = box.scrollHeight;

    input.value = "";

    try {
        await fetch(`/api/messages/${currentConversationId}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: text })
        });

        // 🔥 FORCE RELOAD OF SAME CONVERSATION (NO PAGE RELOAD)
        await loadMessages();

    } catch (err) {
        console.error("Send failed", err);
    }
}
</script>

{% endblock %}
