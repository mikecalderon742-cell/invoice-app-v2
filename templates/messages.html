{% extends "base.html" %}
{% block title %}Messages{% endblock %}

{% block content %}

<style>
.messages-shell {
    display: flex;
    height: calc(100vh - 110px);
}

/* LEFT PANEL */
.convo-list {
    width: 280px;
    border-right: 1px solid #e5e7eb;
    overflow-y: auto;
}

.convo-item {
    padding: 12px;
    cursor: pointer;
    border-bottom: 1px solid #f1f5f9;
}

.convo-item:hover {
    background: #f8fafc;
}

/* RIGHT PANEL */
.chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-bottom: 10px;
}

.bubble.me {
    background: #0ea5e9;
    color: white;
    margin-left: auto;
}

.bubble.them {
    background: #e5e7eb;
}

/* INPUT */
.chat-input {
    display: flex;
    gap: 10px;
    padding: 10px;
    border-top: 1px solid #e5e7eb;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* MOBILE */
@media (max-width: 768px) {
    .messages-shell {
        flex-direction: column;
    }

    .convo-list {
        width: 100%;
        height: 40%;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
    }
}
</style>

<div class="messages-shell">

    <!-- LEFT -->
    <div class="convo-list">
        <h3 style="padding:10px;">Conversations</h3>

        <button onclick="createTestConversation()" style="margin:10px;">
            Create Test Conversation
        </button>

        {% for convo in conversations %}
        <div class="convo-item" onclick="openConversation({{ convo.id }})">
            Conversation {{ convo.id }}
        </div>
        {% endfor %}
    </div>

    <!-- RIGHT -->
    <div class="chat-panel">

        <div id="chatMessages" class="chat-messages">
            <p style="opacity:0.6;">Select a conversation</p>
        </div>

        <form class="chat-input" onsubmit="sendMessage(event)">
            <input id="messageInput" placeholder="Type message..." />
            <button class="btn">Send</button>
        </form>

    </div>

</div>

<script>
let currentConversationId = null;

async function openConversation(id) {
    currentConversationId = id;

    const res = await fetch(`/api/messages/${id}`);
    const data = await res.json();

    const box = document.getElementById("chatMessages");
    box.innerHTML = "";

    data.messages.forEach(msg => {
        const div = document.createElement("div");
        div.classList.add("bubble");

        if (msg.sender_user_id == {{ current_user.id }}) {
            div.classList.add("me");
        } else {
            div.classList.add("them");
        }

        div.innerText = msg.message_text;
        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

async function sendMessage(e) {
    e.preventDefault();

    if (!currentConversationId) return;

    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text) return;

    const box = document.getElementById("chatMessages");

    // ✅ optimistic message
    const temp = document.createElement("div");
    temp.classList.add("bubble", "me");
    temp.innerText = text;
    box.appendChild(temp);

    box.scrollTop = box.scrollHeight;
    input.value = "";

    try {
        await fetch(`/api/messages/${currentConversationId}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: text })
        });

        // ✅ reload messages properly
        setTimeout(() => {
            openConversation(currentConversationId);
        }, 150);

    } catch (err) {
        console.error("Send failed", err);
    }
}

async function createTestConversation() {
    await fetch("/api/create-test-convo");
    location.reload();
}
</script>

{% endblock %}
