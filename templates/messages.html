{% extends "base.html" %}
{% block title %}Messages{% endblock %}

{% block content %}

<style>
.messages-shell {
    display: flex;
    height: calc(100vh - 100px);
    background: #f8fafc;
}

/* LEFT PANEL */
.convo-list {
    width: 320px;
    border-right: 1px solid #e5e7eb;
    background: #ffffff;
    overflow-y: auto;
}

.convo-header {
    padding: 16px;
    font-weight: 700;
    font-size: 18px;
    border-bottom: 1px solid #e5e7eb;
}

.convo-item {
    padding: 14px 16px;
    cursor: pointer;
    border-bottom: 1px solid #f1f5f9;
    transition: 0.2s;
}

.convo-item:hover {
    background: #f1f5f9;
}

.convo-item.active {
    background: #e0f2fe;
}

/* RIGHT PANEL */
.chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #ffffff;
}

/* HEADER */
.chat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid #e5e7eb;
    background: #ffffff;
    font-weight: 700;
}

.chat-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #0ea5e9;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* MESSAGES */
.chat-messages {
    flex: 1;
    padding: 20px 16px 100px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

/* BUBBLES */
.bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.4;
    position: relative;
}

.bubble.me {
    background: #0ea5e9;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 6px;
}

.bubble.them {
    background: #e5e7eb;
    color: #111827;
    align-self: flex-start;
    border-bottom-left-radius: 6px;
}

.timestamp {
    font-size: 11px;
    opacity: 0.5;
    margin-top: 2px;
}

/* INPUT */
.chat-input {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    border-top: 1px solid #e5e7eb;
    background: #ffffff;
    position: sticky;
    bottom: 0;
    z-index: 1000;

    padding-right: 90px; /* avoids floating buttons */
}

.chat-input input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 20px;
    border: 1px solid #d1d5db;
    outline: none;
}

.chat-input button {
    padding: 10px 16px;
    border-radius: 20px;
    border: none;
    background: #0ea5e9;
    color: white;
    font-weight: 600;
}

/* MOBILE */
@media (max-width: 768px) {
    .messages-shell {
        flex-direction: column;
    }

    .convo-list {
        width: 100%;
        height: 35%;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
    }
}
</style>

<div class="messages-shell">

    <!-- LEFT -->
    <div class="convo-list">
        <div class="convo-header">Conversations</div>

        {% for convo in conversations %}
<div class="convo-item"
     onclick="openConversation({{ convo.id }}, this)"
     data-name="{{ convo.display_name }}">
    {{ convo.display_name }}
</div>
        {% endfor %}
    </div>

    <!-- RIGHT -->
    <div class="chat-panel">

        <div class="chat-header">
            <div class="chat-avatar" id="chatAvatar">?</div>            <div id="chatHeaderName">Select a conversation</div>
        </div>

        <div id="chatMessages" class="chat-messages">
            <p style="opacity:0.6;">Select a conversation</p>
        </div>

        <form class="chat-input" onsubmit="return false;">
            <input id="messageInput" placeholder="Type message..." />
            <button type="button" onclick="sendMessage()">Send</button>
        </form>

    </div>

</div>

<script>
let currentConversationId = null;

async function openConversation(id, el = null) {
    currentConversationId = id;

    // highlight active
    document.querySelectorAll(".convo-item").forEach(i => i.classList.remove("active"));
    if (el) el.classList.add("active");

    // ✅ get name safely
    const name = el?.dataset?.name || "Conversation";

    document.getElementById("chatHeaderName").innerText = name;

    // ✅ avatar
    const avatar = document.getElementById("chatAvatar");
    if (avatar && name) {
        avatar.innerText = name.charAt(0).toUpperCase();
    }

    await loadMessages();
}

async function loadMessages() {
    if (!currentConversationId) return;

    const res = await fetch(`/api/messages/${currentConversationId}`);
    const data = await res.json();

    const box = document.getElementById("chatMessages");
    box.innerHTML = "";

    if (!data.messages.length) {
        box.innerHTML = '<p style="opacity:0.6;">No messages yet</p>';
        return;
    }

    data.messages.forEach(msg => appendMessage(msg));

    box.scrollTop = box.scrollHeight;
}

function appendMessage(msg) {
    const box = document.getElementById("chatMessages");

    const wrap = document.createElement("div");

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");

    if (msg.sender_user_id == {{ current_user.id }}) {
        bubble.classList.add("me");
    } else {
        bubble.classList.add("them");
    }

    bubble.innerText = msg.message_text;

    const time = document.createElement("div");
    time.classList.add("timestamp");
    time.innerText = msg.created_at
    ? new Date(
        msg.created_at.endsWith("Z") ? msg.created_at : msg.created_at + "Z"
      ).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : "";

    wrap.appendChild(bubble);
    wrap.appendChild(time);

    box.appendChild(wrap);
}

async function sendMessage() {

    if (!currentConversationId) return;

    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text) return;

    appendMessage({
        sender_user_id: {{ current_user.id }},
        message_text: text,
        created_at: new Date().toISOString()
    });

    const box = document.getElementById("chatMessages");
    box.scrollTop = box.scrollHeight;

    input.value = "";

    try {
        await fetch(`/api/conversation/send-message`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                conversation_id: currentConversationId,
                message_text: text
            })
        });

    } catch (err) {
        console.error("Send failed", err);
    }
}
</script>

{% endblock %}
